<title>7.css example</title><meta charset=UTF-8><meta content="width=device-width,initial-scale=1" name=viewport><link href=https://unpkg.com/7.css rel=stylesheet><style>.window {
      margin: 32px;
      width: 100%;
      max-width: 250px;
    }

    @media (max-width: 600px) {
      .window {
        margin: 16px;
        width: calc(100% - 32px);
      }

      footer {
        margin: 16px;
      }
    }</style><style>:root{--primary:#f9c412;--main-width:calc(100vw - 3em)}@media (min-width:37.5em){:root{--main-width:calc(37.5em - 3em)}}@font-face{font-display:optional;font-family:"Inter UI";font-weight:100 900;font-style:oblique 0deg 10deg;src:url(/fonts/Inter-3.19.var.woff2)format("woff2")}html,input{line-height:1.15}html{-webkit-text-size-adjust:100%;font-family:Inter UI,sans-serif;--font-family:Inter UI, sans-serif}body{margin:0}input{font-family:inherit;font-size:100%;overflow:visible;border-radius:.3em;padding:.75em;max-width:100%}::-webkit-file-upload-button{-webkit-appearance:button;font:inherit}body,p{font-size:1em}input{margin:0 0 1.5em;display:inline}p{margin-bottom:1.5em;margin-bottom:1.36rem}body,p{font-size:1rem;line-height:1.6}@media (min-width:600px){body,p{font-size:1.1rem;line-height:1.6}p{margin-bottom:1.496rem}}@media (min-width:1200px){body,p{font-size:1.2rem;line-height:1.6}p{margin-bottom:1.632rem}}input[type=text]{border:1px solid #595959;padding:.75em}*{border:0;box-sizing:border-box}body{font-family:var(--font-family);background:#181818;color:#eee}footer{background:rgba(0,0,0,.8);color:#fff;padding:3em;text-align:center}footer>*{margin:1.5em}footer p{font-size:90%}::-webkit-scrollbar-thumb:hover{background:var(--primary)}</style><div class=window><div class=title-bar><div class=title-bar-text>My First Program</div></div><div class=window-body><p>Hello, world!</p><input placeholder="Enter text here" style="width: 100%; margin-top: 10px;" type=text></div></div><footer style="margin: 32px; text-align: center;"><p>© 2024 ranvir singh All rights reserved.</footer>
